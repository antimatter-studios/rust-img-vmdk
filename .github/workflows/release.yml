name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: clone am-fs-core sibling
        shell: bash
        run: git clone --depth 1 https://github.com/antimatter-studios/rust-fs-core.git ../rust-fs-core

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate_ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
          if [ "$tag" != "$crate_ver" ]; then
            echo "tag $tag does not match Cargo.toml version $crate_ver" >&2
            exit 1
          fi

      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  # Cross-validates our reader/writer against `qemu-img`. qemu-img is
  # invoked as a subprocess only — never linked, never bundled. The
  # qemu-utils package is installed only on the CI runner. Gating publish
  # on this job ensures the functional proof actually ran before release.
  qemu-validation:
    name: qemu-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: clone am-fs-core sibling
        shell: bash
        run: git clone --depth 1 https://github.com/antimatter-studios/rust-fs-core.git ../rust-fs-core

      - name: install qemu-utils
        run: sudo apt-get update && sudo apt-get install -y qemu-utils
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2

      - name: qemu cross-validation tests
        run: cargo test --features qemu-validation --test qemu_validation

  publish:
    name: publish to crates.io
    needs: [test, qemu-validation]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: rust-lang/crates-io-auth-action@v1.0.4
        id: auth

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
